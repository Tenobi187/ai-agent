<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои документы | Поисковый агент</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- Единая навигационная панель -->
    <div class="nav-panel" id="navPanel">
        <div class="nav-links">
            <a href="/" class="nav-link" id="chatLink">Чат</a>
            <a href="/my-documents" class="nav-link active" id="docsLink">Мои документы</a>
            <a href="/admin" class="nav-link" id="adminLink" style="display: none;">Админ-панель</a>
        </div>
        <div class="user-controls">
            <span class="username" id="username"></span>
            <button class="logout-button" id="logoutButton">Выйти</button>
        </div>
    </div>

    <div class="documents-container">
        <div class="documents-header">
            <h1>Мои документы</h1>
        </div>
        
        <div id="successMessage" style="display: none;" class="message success-message">
        
            <span id="successText"></span>
            <span class="message-close" onclick="this.parentElement.style.display='none'">×</span>
        </div>
        <div id="errorMessage" style="display: none;" class="message error-message">
            
            <span id="errorText"></span>
            <span class="message-close" onclick="this.parentElement.style.display='none'">×</span>
        </div>
        
        <div class="stats" id="stats" style="display: none;">
            <span class="stats-count">Всего документов: <strong id="totalCount">0</strong></span>
            <div style="display: flex; gap: 10px;">
                <button onclick="deleteAllDocuments()" class="button button-danger">Удалить все</button>
                <button onclick="loadDocuments()" class="button button-primary">Обновить</button>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="documentsTable">
                <thead>
                    <tr>
                        <th>Название файла</th>
                        <th>Дата загрузки</th>
                        <th>Чанков</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="documentsTableBody">
                    <tr><td colspan="4" class="loading">Загрузка документов...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/my-documents.js"></script>
    <script src="/static/auth-check.js"></script>
</body>
</html>
