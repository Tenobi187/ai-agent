<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковый агент | Веб-интерфейс</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- Навигационная панель -->
    <div class="nav-panel" id="navPanel">
        <div class="nav-links">
            <a href="/" class="nav-link active" id="chatLink">Чат</a>
            <a href="/my-documents" class="nav-link" id="docsLink">Мои документы</a>
            <a href="/admin" class="nav-link" id="adminLink" style="display: none;">Админ-панель</a>
        </div>
        <div class="user-controls">
            <span class="username" id="username"></span>
            <button class="logout-button" id="logoutButton">Выйти</button>
        </div>
    </div>

    <!-- Оригинальный чат -->
    <div class="chat-container">
        <div class="header">
            <h1>Привет, я поисковый агент</h1>
            <p class="subtitle">Задай свой вопрос, и я найду ответ в документах</p>
        </div>

        <div class="messages" id="messages"></div>
        <div class="upload-area">
            <span class="upload-label">Документы:</span>
            <input type="file" id="fileInput" multiple hidden>
            <button id="selectFilesButton" class="button button-primary">Выбрать</button>
            <button id="uploadButton" class="button button-primary">Загрузить</button>
        </div>
        <div class="input-area">
            <textarea id="messageInput" placeholder="Введите ваш вопрос..." rows="1"></textarea>
            <button id="sendButton">➤</button>
        </div>

        <!-- Загрузка документов внизу -->
        
    </div>

    <script src="/static/auth-check.js"></script>
    <script src="/static/chat.js"></script>
</body>
</html>
